# GitHub Actions Workflow for SkyMechanics
# Updated 2026-04-21 15:21: Added GHCR_PAT secret for registry push

name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: gaineyllc
        password: ${{ secrets.GHCR_PAT }}

    - name: Build and push auth-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/auth-service
        file: ./services/auth-service/Dockerfile
        push: true
        tags: ghcr.io/gaineyllc/auth-service:latest

    - name: Build and push mechanics-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/mechanics-service
        file: ./services/mechanics-service/Dockerfile
        push: true
        tags: ghcr.io/gaineyllc/mechanics-service:latest

    - name: Build and push jobs-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/jobs-service
        file: ./services/jobs-service/Dockerfile
        push: true
        tags: ghcr.io/gaineyllc/jobs-service:latest

    - name: Build and push analytics-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/analytics-service
        file: ./services/analytics-service/Dockerfile
        push: true
        tags: ghcr.io/gaineyllc/analytics-service:latest

    - name: Build and push gateway-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/gateway-service
        file: ./services/gateway-service/Dockerfile
        push: true
        tags: ghcr.io/gaineyllc/gateway-service:latest

    - name: Build and push aircraft-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/aircraft-service
        file: ./services/aircraft-service/Dockerfile
        push: true
        tags: ghcr.io/gaineyllc/aircraft-service:latest

    - name: Build and push parts-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/parts-service
        file: ./services/parts-service/Dockerfile
        push: true
        tags: ghcr.io/gaineyllc/parts-service:latest

    - name: Build and push notification-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/notification-service
        file: ./services/notification-service/Dockerfile
        push: true
        tags: ghcr.io/gaineyllc/notification-service:latest

    - name: Build and push invoice-service
      uses: docker/build-push-action@v5
      with:
        context: ./services/invoice-service
        file: ./services/invoice-service/Dockerfile
        push: true
        tags: ghcr.io/gaineyllc/invoice-service:latest

  deploy:
    needs: build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/master'
    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/dev/namespace.yaml
        kubectl apply -f k8s/dev/

    - name: Verify deployment
      run: |
        kubectl wait --for=condition=available deployment/auth-service --timeout=120s -n skymechanics || (kubectl describe deployment auth-service -n skymechanics && exit 1)
        kubectl wait --for=condition=available deployment/mechanics-service --timeout=120s -n skymechanics || (kubectl describe deployment mechanics-service -n skymechanics && exit 1)
        kubectl wait --for=condition=available deployment/jobs-service --timeout=120s -n skymechanics || (kubectl describe deployment jobs-service -n skymechanics && exit 1)
        kubectl wait --for=condition=available deployment/analytics-service --timeout=120s -n skymechanics || (kubectl describe deployment analytics-service -n skymechanics && exit 1)
        kubectl wait --for=condition=available deployment/gateway-service --timeout=120s -n skymechanics || (kubectl describe deployment gateway-service -n skymechanics && exit 1)
