version: '3.8'
services:
  redis:
    image: redis:7-alpine
    container_name: skymechanics-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  redis-insight:
    image: redis/redisinsight:latest
    container_name: skymechanics-redis-insight
    ports:
      - "5540:5540"
    volumes:
      - redis-insight:/data
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
  redis-insight:
