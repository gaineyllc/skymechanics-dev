apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skymechanics-ingress
  namespace: skymechanics
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.priority: "1"
spec:
  rules:
  # Frontend UI - catch-all at root
  - http:
      paths:
      - backend:
          service:
            name: frontend
            port:
              number: 3000
        path: /
        pathType: Prefix

  # API routes - more specific paths go second (Traefik handles priority)
  - http:
      paths:
      - backend:
          service:
            name: analytics-service
            port:
              number: 8203
        path: /api/analytics
        pathType: Prefix
      - backend:
          service:
            name: gateway-service
            port:
              number: 8204
        path: /api/gateway
        pathType: Prefix
      - backend:
          service:
            name: auth-service
            port:
              number: 8200
        path: /api/auth
        pathType: Prefix
      - backend:
          service:
            name: mechanics-service
            port:
              number: 8201
        path: /api/mechanics
        pathType: Prefix
      - backend:
          service:
            name: jobs-service
            port:
              number: 8202
        path: /api/jobs
        pathType: Prefix
      - backend:
          service:
            name: auth-service
            port:
              number: 8200
        path: /api
        pathType: Prefix
