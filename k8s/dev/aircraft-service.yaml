---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aircraft-service
  namespace: skymechanics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aircraft-service
  template:
    metadata:
      labels:
        app: aircraft-service
    spec:
      serviceAccountName: skymechanics-sa
      containers:
      - name: aircraft-service
        image: ghcr.io/gaineyllc/aircraft-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8205
        env:
        - name: PORT
          value: "8205"
        - name: FALKORDB_HOST
          value: "skymechanics-falkordb"
        - name: FALKORDB_PORT
          value: "6379"
        - name: FALKORDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: skymechanics-secrets
              key: FALKORDB_PASSWORD
        - name: POSTGRES_HOST
          value: "skymechanics-postgres"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: skymechanics-secrets
              key: POSTGRES_PASSWORD
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8205
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8205
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aircraft-service
  namespace: skymechanics
spec:
  selector:
    app: aircraft-service
  ports:
  - port: 8205
    targetPort: 8205
  type: ClusterIP
