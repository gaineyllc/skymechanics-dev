apiVersion: apps/v1
kind: Deployment
metadata:
  name: aircraft-service
  namespace: skymechanics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aircraft-service
  template:
    metadata:
      labels:
        app: aircraft-service
    spec:
      containers:
      - name: aircraft-service
        image: ghcr.io/gaineyllc/aircraft-service:latest
        ports:
        - containerPort: 8208
        env:
        - name: FALKORDB_HOST
          value: "falkordb"
        - name: FALKORDB_PORT
          value: "6379"
        - name: PORT
          value: "8208"
        - name: MULTI_TENANCY_ENABLED
          value: "true"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8208
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8208
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aircraft-service
  namespace: skymechanics
spec:
  selector:
    app: aircraft-service
  ports:
  - port: 8208
    targetPort: 8208
  type: ClusterIP
