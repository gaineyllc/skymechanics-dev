apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: skymechanics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: ghcr.io/gaineyllc/notification-service:latest
        ports:
        - containerPort: 8206
        env:
        - name: FALKORDB_HOST
          value: "falkordb"
        - name: FALKORDB_PORT
          value: "6379"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: PORT
          value: "8206"
        - name: MULTI_TENANCY_ENABLED
          value: "true"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8206
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8206
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: skymechanics
spec:
  selector:
    app: notification-service
  ports:
  - port: 8206
    targetPort: 8206
  type: ClusterIP
