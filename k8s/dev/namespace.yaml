---
apiVersion: v1
kind: Namespace
metadata:
  name: skymechanics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: skymechanics
data:
  LOG_LEVEL: "info"
  FALKORDB_HOST: "skymechanics-falkordb"
  FALKORDB_PORT: "6379"
  REDIS_HOST: "skymechanics-redis"
  REDIS_PORT: "6379"
  POSTGRES_HOST: "skymechanics-postgres"
  POSTGRES_PORT: "5432"
  CLICKHOUSE_HOST: "skymechanics-clickhouse"
  CLICKHOUSE_PORT: "9000"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: skymechanics-sa
  namespace: skymechanics
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: skymechanics-role
  namespace: skymechanics
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: skymechanics-rolebinding
  namespace: skymechanics
subjects:
- kind: ServiceAccount
  name: skymechanics-sa
  namespace: skymechanics
roleRef:
  kind: Role
  name: skymechanics-role
  apiGroup: rbac.authorization.k8s.io
