---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: skymechanics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
      - name: gateway-service
        image: ghcr.io/gaineyllc/gateway-service:latest
        ports:
        - containerPort: 8204
        env:
        - name: PORT
          value: "8204"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8204
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8204
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: skymechanics
spec:
  selector:
    app: gateway-service
  ports:
  - port: 8204
    targetPort: 8204
  type: ClusterIP
