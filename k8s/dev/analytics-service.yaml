---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: skymechanics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
      - name: analytics-service
        image: ghcr.io/gaineyllc/analytics-service:latest
        ports:
        - containerPort: 8203
        env:
        - name: PORT
          value: "8203"
        - name: CLICKHOUSE_HOST
          value: "skymechanics-clickhouse"
        - name: CLICKHOUSE_PORT
          value: "9000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8203
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8203
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: skymechanics
spec:
  selector:
    app: analytics-service
  ports:
  - port: 8203
    targetPort: 8203
  type: ClusterIP
