---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mechanics-service
  namespace: skymechanics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mechanics-service
  template:
    metadata:
      labels:
        app: mechanics-service
    spec:
      containers:
      - name: mechanics-service
        image: ghcr.io/gaineyllc/mechanics-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8201
        env:
        - name: PORT
          value: "8201"
        - name: FALKORDB_HOST
          value: "skymechanics-falkordb"
        - name: FALKORDB_PORT
          value: "6379"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8201
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8201
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mechanics-service
  namespace: skymechanics
spec:
  selector:
    app: mechanics-service
  ports:
  - port: 8201
    targetPort: 8201
  type: ClusterIP
