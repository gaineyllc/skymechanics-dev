---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parts-service
  namespace: skymechanics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parts-service
  template:
    metadata:
      labels:
        app: parts-service
    spec:
      serviceAccountName: skymechanics-sa
      containers:
      - name: parts-service
        image: parts-service:dev
        imagePullPolicy: Never
        ports:
        - containerPort: 8208
        env:
        - name: PORT
          value: "8208"
        - name: FALKORDB_HOST
          value: "skymechanics-falkordb"
        - name: FALKORDB_PORT
          value: "6379"
        - name: FALKORDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: skymechanics-secrets
              key: FALKORDB_PASSWORD
        - name: POSTGRES_HOST
          value: "skymechanics-postgres"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: skymechanics-secrets
              key: POSTGRES_PASSWORD
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8208
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8208
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: parts-service
  namespace: skymechanics
spec:
  selector:
    app: parts-service
  ports:
  - port: 8208
    targetPort: 8208
  type: ClusterIP
