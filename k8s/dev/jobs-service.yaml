---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobs-service
  namespace: skymechanics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jobs-service
  template:
    metadata:
      labels:
        app: jobs-service
    spec:
      containers:
      - name: jobs-service
        image: ghcr.io/gaineyllc/jobs-service:latest
        ports:
        - containerPort: 8202
        env:
        - name: PORT
          value: "8202"
        - name: FALKORDB_HOST
          value: "skymechanics-falkordb"
        - name: FALKORDB_PORT
          value: "6379"
        - name: REDIS_HOST
          value: "skymechanics-redis"
        - name: REDIS_PORT
          value: "6379"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8202
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8202
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: jobs-service
  namespace: skymechanics
spec:
  selector:
    app: jobs-service
  ports:
  - port: 8202
    targetPort: 8202
  type: ClusterIP
