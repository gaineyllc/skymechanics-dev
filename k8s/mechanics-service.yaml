apiVersion: apps/v1
kind: Deployment
metadata:
  name: mechanics-service
  namespace: skymechanics
  labels:
    app: mechanics-service
    memory-optimized: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mechanics-service
  template:
    metadata:
      labels:
        app: mechanics-service
        memory-optimized: "true"
    spec:
      serviceAccountName: skymechanics-sa
      containers:
      - name: mechanics-service
        image: ghcr.io/gaineyllc/mechanics-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
          name: http
        env:
        - name: FALKORDB_HOST
          value: "falkordb.skymechanics.svc.cluster.local"
        - name: FALKORDB_PORT
          value: "6379"
        - name: FALKORDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: skymechanics-secrets
              key: FALKORDB_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mechanics-service
  namespace: skymechanics
  labels:
    app: mechanics-service
spec:
  selector:
    app: mechanics-service
  ports:
  - name: http
    port: 8001
    targetPort: 8001
  type: ClusterIP
