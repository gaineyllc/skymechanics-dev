apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: skymechanics
data:
  grafana.ini: |
    [server]
    protocol = http
    http_addr = 0.0.0.0
    http_port = 3000
    domain = localhost
    root_url = http://localhost:3000/

    [security]
    admin_user = admin
    admin_password = admin

    [auth.anonymous]
    enabled = true
    org_role = Viewer

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: skymechanics
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: GF_AUTH_ANALYZER_ENABLED
          value: "false"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        volumeMounts:
        - name: config
          mountPath: /etc/grafana
        - name: data
          mountPath: /var/lib/grafana
        - name: dashboards
          mountPath: /var/lib/grafana/dashboards
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: grafana-config
      - name: data
        emptyDir: {}
      - name: dashboards
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: skymechanics
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  type: LoadBalancer
