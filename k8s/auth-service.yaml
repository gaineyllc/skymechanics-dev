apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: skymechanics
  labels:
    app: auth-service
    memory-optimized: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        memory-optimized: "true"
    spec:
      serviceAccountName: skymechanics-sa
      containers:
      - name: auth-service
        image: skymechanics-dev-auth-service:dev
        imagePullPolicy: Never
        ports:
        - containerPort: 8200
          name: http
        env:
        - name: PORT
          value: "8200"
        - name: DATABASE_URL
          value: "postgresql://skymechanics:skymechanics-dev@postgres:5432/skymechanics"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: skymechanics-secrets
              key: JWT_SECRET
        - name: FALKORDB_HOST
          value: falkordb
        - name: FALKORDB_PORT
          value: "6379"
        - name: FALKORDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: skymechanics-secrets
              key: FALKORDB_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8200
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8200
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: skymechanics
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
  - name: http
    port: 8200
    targetPort: 8200
  type: ClusterIP
