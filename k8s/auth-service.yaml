apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: skymechanics
  labels:
    app: auth-service
    memory-optimized: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        memory-optimized: "true"
    spec:
      serviceAccountName: skymechanics-sa
      containers:
      - name: auth-service
        image: ghcr.io/gaineyllc/auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8200
          name: http
        env:
        - name: PORT
          value: "8200"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: skymechanics-secrets
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: skymechanics-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8200
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/ready
            port: 8200
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: skymechanics
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
  - name: http
    port: 8200
    targetPort: 8200
  type: ClusterIP
