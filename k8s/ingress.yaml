apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skymechanics-ingress
  namespace: skymechanics
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8000
      - path: /api/mechanics
        pathType: Prefix
        backend:
          service:
            name: mechanics-service
            port:
              number: 8001
      - path: /api/jobs
        pathType: Prefix
        backend:
          service:
            name: jobs-service
            port:
              number: 8002
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8000
