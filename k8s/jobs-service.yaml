apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobs-service
  namespace: skymechanics
  labels:
    app: jobs-service
    memory-optimized: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobs-service
  template:
    metadata:
      labels:
        app: jobs-service
        memory-optimized: "true"
    spec:
      serviceAccountName: skymechanics-sa
      containers:
      - name: jobs-service
        image: skymechanics-backend:dev
        imagePullPolicy: Never
        ports:
        - containerPort: 8002
          name: http
        env:
        - name: PORT
          value: "8002"
        - name: FALKORDB_HOST
          value: "falkordb.skymechanics.svc.cluster.local"
        - name: FALKORDB_PORT
          value: "6379"
        - name: FALKORDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: skymechanics-secrets
              key: FALKORDB_PASSWORD
        - name: POSTGRES_HOST
          value: "postgres.skymechanics.svc.cluster.local"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: skymechanics-secrets
              key: POSTGRES_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: jobs-service
  namespace: skymechanics
  labels:
    app: jobs-service
spec:
  selector:
    app: jobs-service
  ports:
  - name: http
    port: 8002
    targetPort: 8002
  type: ClusterIP
