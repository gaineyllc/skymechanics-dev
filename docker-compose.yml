services:
  # FalkorDB - Graph Database (multi-tenancy enabled)
  falkordb:
    image: falkordb/falkordb-server:latest
    container_name: skymechanics-falkordb
    ports:
      - "6379:6379"  # Redis protocol
      - "3000:3000"  # FalkorDB Browser (HTTP)
    volumes:
      - falkordb-data:/data
      - ./scripts:/scripts
    environment:
      - REDIS_MODULE=/falkordb/falkordb.so
      - MULTI_TENANCY_ENABLED=true
      - FALKORDB_MAX_GRAPHS=100
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cluster - Production caching and Pub/Sub
  redis:
    image: redis/redis-stack:latest
    container_name: skymechanics-redis
    ports:
      - "6380:6379"  # Redis port
      - "8001:8001"  # RedisInsight
    volumes:
      - redis-data:/data
    environment:
      - REDIS_ARGS=--maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FalkorDB Browser (optional, for development)
  browser:
    image: falkordb/falkordb-browser:latest
    container_name: skymechanics-browser
    ports:
      - "3001:3000"
    environment:
      - REDIS_HOST=falkordb
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      - falkordb
    restart: unless-stopped

  # FastAPI Backend (monolithic fallback)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skymechanics-api
    ports:
      - "8080:8000"
    environment:
      - host=falkordb
      - port=6379
      - FALKORDB_PASSWORD=${FALKORDB_PASSWORD:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - vllm_url=http://100.69.118.20:8000
      - ENV=production
    depends_on:
      - falkordb
      - redis
    volumes:
      - ./backend:/app
      - /home/gaineyllc/.openclaw/workspace:/workspace:ro
    restart: unless-stopped

  # React Frontend - rebuilt on each start
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skymechanics-frontend
    ports:
      - "3003:3000"
    restart: unless-stopped

  # Auth Service
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: skymechanics-auth-service
    ports:
      - "8200:8200"
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - PORT=8200
      - MULTI_TENANCY_ENABLED=true
    depends_on:
      - falkordb
      - redis
    restart: unless-stopped

  # Mechanics Service
  mechanics-service:
    build:
      context: ./services/mechanics-service
      dockerfile: Dockerfile
    container_name: skymechanics-mechanics-service
    ports:
      - "8201:8201"
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - PORT=8201
      - MULTI_TENANCY_ENABLED=true
    depends_on:
      - falkordb
      - redis
    restart: unless-stopped

  # Jobs Service
  jobs-service:
    build:
      context: ./services/jobs-service
      dockerfile: Dockerfile
    container_name: skymechanics-jobs-service
    ports:
      - "8202:8202"
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - PORT=8202
      - MULTI_TENANCY_ENABLED=true
    depends_on:
      - falkordb
      - redis
    restart: unless-stopped

  # Analytics Service
  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: skymechanics-analytics-service
    ports:
      - "8203:8203"
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - PORT=8203
      - MULTI_TENANCY_ENABLED=true
    depends_on:
      - falkordb
      - redis
    restart: unless-stopped

  # Gateway Service
  gateway-service:
    build:
      context: ./services/gateway-service
      dockerfile: Dockerfile
    container_name: skymechanics-gateway-service
    ports:
      - "8204:8204"
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - PORT=8204
      - MULTI_TENANCY_ENABLED=true
    depends_on:
      - falkordb
      - redis
    restart: unless-stopped

  # Aircraft Service
  aircraft-service:
    build:
      context: ./services/aircraft-service
      dockerfile: Dockerfile
    container_name: skymechanics-aircraft-service
    ports:
      - "8208:8208"
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - PORT=8208
      - MULTI_TENANCY_ENABLED=true
    depends_on:
      - falkordb
      - redis
    restart: unless-stopped

  # Parts Service
  parts-service:
    build:
      context: ./services/parts-service
      dockerfile: Dockerfile
    container_name: skymechanics-parts-service
    ports:
      - "8205:8205"
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - PORT=8205
      - MULTI_TENANCY_ENABLED=true
    depends_on:
      - falkordb
      - redis
    restart: unless-stopped

  # Notification Service
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: skymechanics-notification-service
    ports:
      - "8206:8206"
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=8206
      - MULTI_TENANCY_ENABLED=true
    depends_on:
      - falkordb
      - redis
    restart: unless-stopped

  # Invoice Service
  invoice-service:
    build:
      context: ./services/invoice-service
      dockerfile: Dockerfile
    container_name: skymechanics-invoice-service
    ports:
      - "8207:8207"
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - PORT=8207
      - MULTI_TENANCY_ENABLED=true
    depends_on:
      - falkordb
      - redis
    restart: unless-stopped

volumes:
  falkordb-data:
  redis-data:
